<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 80" preserveAspectRatio="none">
  <defs>
    <pattern id="header-dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="2" fill="rgba(255,255,255,0.3)"/>
      <circle cx="30" cy="30" r="1.5" fill="rgba(255,255,255,0.2)"/>
      <circle cx="25" cy="5" r="1" fill="rgba(255,255,255,0.15)"/>
    </pattern>
    <pattern id="header-lines" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M0 30 Q15 20 30 30 T60 30" stroke="rgba(255,255,255,0.1)" fill="none" stroke-width="1"/>
      <path d="M0 50 Q20 40 40 50 T80 50" stroke="rgba(255,255,255,0.08)" fill="none" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#header-dots)"/>
  <rect width="100%" height="100%" fill="url(#header-lines)"/>
</svg>
