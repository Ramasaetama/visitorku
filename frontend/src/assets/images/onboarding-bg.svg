<svg width="800" height="1200" viewBox="0 0 800 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8A23B"/>
      <stop offset="100%" style="stop-color:#EE9D0F"/>
    </linearGradient>
    <pattern id="spiralPattern" x="0" y="0" width="150" height="150" patternUnits="userSpaceOnUse">
      <g fill="none" stroke="#D4954A" stroke-width="6" opacity="0.5">
        <circle cx="75" cy="75" r="15"/>
        <circle cx="75" cy="75" r="25"/>
        <circle cx="75" cy="75" r="35"/>
        <circle cx="75" cy="75" r="45"/>
        <circle cx="75" cy="75" r="55"/>
        <circle cx="75" cy="75" r="65"/>
        <circle cx="75" cy="75" r="75"/>
      </g>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#bgGradient)"/>
  <rect width="100%" height="100%" fill="url(#spiralPattern)"/>
</svg>